<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Recomendacion con factores latentes</title>
  <desc id="desc">Una matriz usuario-item se aproxima como producto de factores de usuarios y factores de items. La prediccion es un producto punto en baja dimension.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="64" y="40" fill="#17324d" font-family="Arial, sans-serif" font-size="26" font-weight="700">Recomendacion: completar una matriz con estructura latente</text>

  <g transform="translate(58,82)">
    <text x="34" y="-12" fill="#17324d" font-family="Arial, sans-serif" font-size="20" font-weight="700">ratings R</text>
    <rect x="0" y="0" width="210" height="168" fill="#ffffff" stroke="#17324d" stroke-width="2"/>
    <g stroke="#d5dee8" stroke-width="1">
      <line x1="42" y1="0" x2="42" y2="168"/><line x1="84" y1="0" x2="84" y2="168"/><line x1="126" y1="0" x2="126" y2="168"/><line x1="168" y1="0" x2="168" y2="168"/>
      <line x1="0" y1="42" x2="210" y2="42"/><line x1="0" y1="84" x2="210" y2="84"/><line x1="0" y1="126" x2="210" y2="126"/>
    </g>
    <rect x="0" y="0" width="42" height="42" fill="#dcfce7"/><rect x="84" y="0" width="42" height="42" fill="#e0f2fe"/><rect x="168" y="0" width="42" height="42" fill="#fee2e2"/>
    <rect x="42" y="42" width="42" height="42" fill="#fef3c7"/><rect x="126" y="42" width="42" height="42" fill="#dcfce7"/>
    <rect x="0" y="84" width="42" height="42" fill="#e0f2fe"/><rect x="84" y="84" width="42" height="42" fill="#f8fafc"/><rect x="168" y="84" width="42" height="42" fill="#dcfce7"/>
    <rect x="42" y="126" width="42" height="42" fill="#fee2e2"/><rect x="126" y="126" width="42" height="42" fill="#e0f2fe"/>
    <text x="91" y="111" fill="#b91c1c" font-family="Arial, sans-serif" font-size="28" font-weight="700">?</text>
  </g>

  <path d="M292 166 L358 166" stroke="#17324d" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(382,82)">
    <text x="30" y="-12" fill="#17324d" font-family="Arial, sans-serif" font-size="20" font-weight="700">usuarios U</text>
    <rect x="0" y="0" width="110" height="168" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <line x1="55" y1="0" x2="55" y2="168" stroke="#d5dee8"/>
    <g stroke="#d5dee8">
      <line x1="0" y1="42" x2="110" y2="42"/><line x1="0" y1="84" x2="110" y2="84"/><line x1="0" y1="126" x2="110" y2="126"/>
    </g>
    <text x="132" y="90" fill="#17324d" font-family="Arial, sans-serif" font-size="30" font-weight="700">x</text>
    <text x="191" y="-12" fill="#17324d" font-family="Arial, sans-serif" font-size="20" font-weight="700">items V<tspan baseline-shift="super" font-size="12">T</tspan></text>
    <rect x="182" y="52" width="210" height="64" fill="#fef3c7" stroke="#17324d" stroke-width="2"/>
    <line x1="182" y1="84" x2="392" y2="84" stroke="#d5dee8"/>
    <g stroke="#d5dee8">
      <line x1="224" y1="52" x2="224" y2="116"/><line x1="266" y1="52" x2="266" y2="116"/><line x1="308" y1="52" x2="308" y2="116"/><line x1="350" y1="52" x2="350" y2="116"/>
    </g>
  </g>

  <path d="M798 166 L854 166" stroke="#17324d" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(858,104)">
    <rect x="0" y="0" width="88" height="92" rx="12" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
    <text x="20" y="38" fill="#166534" font-family="Arial, sans-serif" font-size="24" font-weight="700">r_ij</text>
    <text x="16" y="66" fill="#166534" font-family="Arial, sans-serif" font-size="18">predicho</text>
  </g>

  <text x="146" y="314" fill="#17324d" font-family="Arial, sans-serif" font-size="21" font-weight="700">Lectura:</text>
  <text x="242" y="314" fill="#17324d" font-family="Arial, sans-serif" font-size="21">factores latentes explican patrones; la validacion decide si recomiendan bien.</text>
</svg>
