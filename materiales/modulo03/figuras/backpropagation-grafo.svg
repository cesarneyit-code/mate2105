<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Backpropagation como grafo</title>
  <desc id="desc">Forward calcula activaciones hasta la perdida y backward usa la cache para regresar gradientes hacia los parametros.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="64" y="52" fill="#17324d" font-family="Arial, sans-serif" font-size="24" font-weight="700">forward pass</text>
  <text x="64" y="202" fill="#b91c1c" font-family="Arial, sans-serif" font-size="24" font-weight="700">backward pass</text>
  <g font-family="Arial, sans-serif" font-size="20" font-weight="700">
    <rect x="70" y="88" width="95" height="60" rx="10" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <text x="105" y="125" fill="#17324d">X</text>
    <rect x="210" y="88" width="95" height="60" rx="10" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <text x="243" y="125" fill="#17324d">Z1</text>
    <rect x="350" y="88" width="95" height="60" rx="10" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <text x="383" y="125" fill="#17324d">A1</text>
    <rect x="490" y="88" width="95" height="60" rx="10" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <text x="523" y="125" fill="#17324d">Z2</text>
    <rect x="630" y="88" width="95" height="60" rx="10" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <text x="669" y="125" fill="#17324d">P</text>
    <rect x="770" y="88" width="95" height="60" rx="10" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
    <text x="809" y="125" fill="#17324d">J</text>
  </g>
  <g stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow-blue)">
    <line x1="165" y1="118" x2="205" y2="118"/>
    <line x1="305" y1="118" x2="345" y2="118"/>
    <line x1="445" y1="118" x2="485" y2="118"/>
    <line x1="585" y1="118" x2="625" y2="118"/>
    <line x1="725" y1="118" x2="765" y2="118"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="210" y="210" width="95" height="54" rx="10" fill="#fff7ed" stroke="#b91c1c" stroke-width="2"/>
    <text x="239" y="244" fill="#b91c1c">dZ1</text>
    <rect x="350" y="210" width="95" height="54" rx="10" fill="#fff7ed" stroke="#b91c1c" stroke-width="2"/>
    <text x="377" y="244" fill="#b91c1c">dA1</text>
    <rect x="490" y="210" width="95" height="54" rx="10" fill="#fff7ed" stroke="#b91c1c" stroke-width="2"/>
    <text x="519" y="244" fill="#b91c1c">dZ2</text>
    <rect x="630" y="210" width="95" height="54" rx="10" fill="#fff7ed" stroke="#b91c1c" stroke-width="2"/>
    <text x="653" y="244" fill="#b91c1c">dP</text>
  </g>
  <g stroke="#b91c1c" stroke-width="4" fill="none" marker-end="url(#arrow-red)">
    <path d="M820 150 C810 205, 752 236, 730 236"/>
    <line x1="630" y1="236" x2="590" y2="236"/>
    <line x1="490" y1="236" x2="450" y2="236"/>
    <line x1="350" y1="236" x2="310" y2="236"/>
  </g>
  <g fill="#f8fafc" stroke="#475569" stroke-width="2">
    <rect x="503" y="286" width="170" height="45" rx="8"/>
    <rect x="228" y="286" width="170" height="45" rx="8"/>
  </g>
  <text x="526" y="315" fill="#475569" font-family="Arial, sans-serif" font-size="18" font-weight="700">dW2 = A1^T dZ2</text>
  <text x="250" y="315" fill="#475569" font-family="Arial, sans-serif" font-size="18" font-weight="700">dW1 = X^T dZ1</text>
  <path d="M380 150 C410 178, 492 183, 525 210" fill="none" stroke="#0f766e" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="398" y="188" fill="#0f766e" font-family="Arial, sans-serif" font-size="16">cache</text>
</svg>
