<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Regresion logistica, umbral y metricas</title>
  <desc id="desc">La regresion logistica produce probabilidades. Un umbral convierte probabilidades en clases y cambia la matriz de confusion y las metricas.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="64" y="40" fill="#17324d" font-family="Arial, sans-serif" font-size="26" font-weight="700">Clasificar es decidir un umbral sobre probabilidades</text>

  <g transform="translate(60,72)">
    <line x1="0" y1="210" x2="330" y2="210" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="210" x2="0" y2="20" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="120" y="240" fill="#475569" font-family="Arial, sans-serif" font-size="17">score z = x theta</text>
    <text x="-40" y="28" fill="#475569" font-family="Arial, sans-serif" font-size="17" transform="rotate(-90 -40 28)">P(y=1|x)</text>
    <path d="M18 196 C88 190, 132 165, 166 116 C198 70, 238 42, 312 34" fill="none" stroke="#2563eb" stroke-width="6"/>
    <line x1="184" y1="210" x2="184" y2="26" stroke="#b91c1c" stroke-width="3" stroke-dasharray="8 7"/>
    <line x1="0" y1="112" x2="318" y2="112" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 6"/>
    <text x="192" y="66" fill="#b91c1c" font-family="Arial, sans-serif" font-size="19" font-weight="700">umbral tau</text>
    <text x="19" y="106" fill="#475569" font-family="Arial, sans-serif" font-size="16">0.5</text>
  </g>

  <path d="M425 180 L498 180" stroke="#17324d" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(520,75)">
    <rect x="0" y="0" width="170" height="50" rx="8" fill="#eef6fb" stroke="#17324d"/>
    <text x="29" y="31" fill="#17324d" font-family="Arial, sans-serif" font-size="19" font-weight="700">p >= tau -> 1</text>
    <rect x="0" y="73" width="170" height="50" rx="8" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="30" y="104" fill="#17324d" font-family="Arial, sans-serif" font-size="19" font-weight="700">p &lt; tau -> 0</text>
    <text x="3" y="162" fill="#475569" font-family="Arial, sans-serif" font-size="17">Cambiar tau cambia</text>
    <text x="3" y="185" fill="#475569" font-family="Arial, sans-serif" font-size="17">errores y decisiones.</text>
  </g>

  <g transform="translate(735,73)">
    <text x="22" y="0" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">matriz de confusion</text>
    <rect x="0" y="26" width="196" height="170" fill="#ffffff" stroke="#17324d" stroke-width="2"/>
    <line x1="98" y1="26" x2="98" y2="196" stroke="#17324d" stroke-width="2"/>
    <line x1="0" y1="111" x2="196" y2="111" stroke="#17324d" stroke-width="2"/>
    <rect x="0" y="26" width="98" height="85" fill="#e0f2fe"/>
    <rect x="98" y="111" width="98" height="85" fill="#dcfce7"/>
    <rect x="98" y="26" width="98" height="85" fill="#fee2e2"/>
    <rect x="0" y="111" width="98" height="85" fill="#fef3c7"/>
    <text x="31" y="77" fill="#17324d" font-family="Arial, sans-serif" font-size="24" font-weight="700">TN</text>
    <text x="129" y="77" fill="#b91c1c" font-family="Arial, sans-serif" font-size="24" font-weight="700">FP</text>
    <text x="30" y="162" fill="#b45309" font-family="Arial, sans-serif" font-size="24" font-weight="700">FN</text>
    <text x="129" y="162" fill="#166534" font-family="Arial, sans-serif" font-size="24" font-weight="700">TP</text>
  </g>
</svg>
