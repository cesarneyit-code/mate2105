<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">PCA y SVD como proyeccion</title>
  <desc id="desc">Una nube centrada se proyecta sobre las direcciones principales de V para producir coordenadas Z de baja dimension.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <g transform="translate(85,38)">
    <ellipse cx="250" cy="165" rx="180" ry="58" fill="#eef6fb" stroke="#17324d" stroke-width="2" transform="rotate(-24 250 165)"/>
    <g fill="#0f766e" opacity="0.78">
      <circle cx="146" cy="205" r="5"/><circle cx="182" cy="186" r="5"/><circle cx="214" cy="170" r="5"/>
      <circle cx="246" cy="154" r="5"/><circle cx="284" cy="140" r="5"/><circle cx="318" cy="119" r="5"/>
      <circle cx="357" cy="105" r="5"/><circle cx="205" cy="210" r="5"/><circle cx="271" cy="188" r="5"/>
      <circle cx="335" cy="148" r="5"/><circle cx="395" cy="126" r="5"/><circle cx="168" cy="152" r="5"/>
    </g>
    <line x1="250" y1="165" x2="444" y2="76" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="250" y1="165" x2="189" y2="35" stroke="#b91c1c" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="450" y="76" fill="#2563eb" font-family="Arial, sans-serif" font-size="23" font-weight="700">v1</text>
    <text x="163" y="34" fill="#b91c1c" font-family="Arial, sans-serif" font-size="23" font-weight="700">v2</text>
    <path d="M284 140 L332 118" stroke="#475569" stroke-width="3" stroke-dasharray="7 6"/>
    <circle cx="332" cy="118" r="6" fill="#2563eb"/>
    <text x="117" y="275" fill="#17324d" font-family="Arial, sans-serif" font-size="20" font-weight="700">datos centrados Xc</text>
  </g>
  <g transform="translate(610,64)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="310" height="205" rx="12" fill="#f8fafc" stroke="#17324d" stroke-width="2"/>
    <text x="28" y="48" fill="#17324d" font-size="28" font-weight="700">Xc = U Sigma V^T</text>
    <text x="28" y="92" fill="#475569" font-size="20">V define direcciones</text>
    <text x="28" y="125" fill="#475569" font-size="20">Sigma ordena varianza</text>
    <text x="28" y="158" fill="#475569" font-size="20">Z = Xc Vk</text>
    <text x="28" y="190" fill="#0f766e" font-size="18" font-weight="700">baja dimension</text>
  </g>
</svg>
