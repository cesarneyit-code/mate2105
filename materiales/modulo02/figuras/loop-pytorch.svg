<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Responsabilidades de un paso de entrenamiento en PyTorch</title>
  <desc id="desc">Ciclo desde un minibatch hasta la actualización de parámetros y el registro de métricas.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#667085"/></marker>
    <style>
      .node{fill:#fff;stroke:#cfd5df;stroke-width:2}.accent{stroke:#0f766e;stroke-width:5}.blue{stroke:#245bbf;stroke-width:5}.gold{stroke:#a66b00;stroke-width:5}
      .title{font:700 22px Arial,sans-serif;fill:#172033}.code{font:18px Menlo,monospace;fill:#245bbf}.code-small{font:16px Menlo,monospace;fill:#245bbf}.note{font:18px Arial,sans-serif;fill:#566174}
      .arrow{stroke:#667085;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="node accent" x="35" y="135" width="155" height="125" rx="5"/><text class="title" x="112" y="180" text-anchor="middle">Minibatch</text><text class="code" x="112" y="220" text-anchor="middle">X, y</text>
  <line class="arrow" x1="198" y1="198" x2="246" y2="198"/>
  <rect class="node blue" x="254" y="105" width="180" height="185" rx="5"/><text class="title" x="344" y="150" text-anchor="middle">Limpiar</text><text class="code" x="344" y="192" text-anchor="middle">zero_grad()</text><text class="note" x="344" y="235" text-anchor="middle">evita acumulación</text>
  <line class="arrow" x1="442" y1="198" x2="490" y2="198"/>
  <rect class="node gold" x="498" y="75" width="205" height="245" rx="5"/><text class="title" x="600" y="125" text-anchor="middle">Forward + pérdida</text><text class="code-small" x="600" y="168" text-anchor="middle">logits = model(X)</text><text class="code-small" x="600" y="202" text-anchor="middle">loss =</text><text class="code-small" x="600" y="226" text-anchor="middle">criterion(logits, y)</text><text class="note" x="600" y="275" text-anchor="middle">sin softmax previo</text>
  <line class="arrow" x1="711" y1="198" x2="759" y2="198"/>
  <rect class="node blue" x="767" y="105" width="180" height="185" rx="5"/><text class="title" x="857" y="150" text-anchor="middle">Backward</text><text class="code" x="857" y="192" text-anchor="middle">loss.backward()</text><text class="note" x="857" y="235" text-anchor="middle">calcula .grad</text>
  <line class="arrow" x1="955" y1="198" x2="1003" y2="198"/>
  <rect class="node accent" x="1011" y="105" width="155" height="185" rx="5"/><text class="title" x="1088" y="150" text-anchor="middle">Actualizar</text><text class="code" x="1088" y="192" text-anchor="middle">step()</text><text class="note" x="1088" y="235" text-anchor="middle">un update</text>
  <path class="arrow" d="M1088 300 C1088 385 345 390 345 305" fill="none"/>
  <text class="note" x="715" y="385" text-anchor="middle">Registrar pérdida, métrica y número de actualización antes del siguiente batch.</text>
</svg>
