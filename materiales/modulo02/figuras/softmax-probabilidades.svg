<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Softmax estable aplicado por fila</title>
  <desc id="desc">Una fila de logits se centra, se exponencia y se normaliza para obtener probabilidades.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#667085"/></marker>
    <style>
      .panel{fill:#fff;stroke:#cfd5df;stroke-width:2}.top{stroke:#0f766e;stroke-width:6}.blue{stroke:#245bbf;stroke-width:6}.gold{stroke:#a66b00;stroke-width:6}
      .title{font:700 24px Arial,sans-serif;fill:#172033}.math{font:25px Georgia,serif;fill:#172033}.note{font:19px Arial,sans-serif;fill:#566174}
      .arrow{stroke:#667085;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="panel top" x="35" y="105" width="220" height="190" rx="5"/>
  <text class="title" x="145" y="153" text-anchor="middle">Logits de una fila</text>
  <text class="math" x="145" y="208" text-anchor="middle">[4, 1, −2]</text>
  <text class="note" x="145" y="250" text-anchor="middle">scores sin normalizar</text>
  <line class="arrow" x1="265" y1="200" x2="328" y2="200"/>
  <rect class="panel blue" x="336" y="80" width="235" height="240" rx="5"/>
  <text class="title" x="453" y="130" text-anchor="middle">Restar el máximo</text>
  <text class="math" x="453" y="187" text-anchor="middle">[0, −3, −6]</text>
  <text class="note" x="453" y="235" text-anchor="middle">no cambia softmax</text>
  <text class="note" x="453" y="270" text-anchor="middle">evita exponentes grandes</text>
  <line class="arrow" x1="581" y1="200" x2="644" y2="200"/>
  <rect class="panel gold" x="652" y="105" width="220" height="190" rx="5"/>
  <text class="title" x="762" y="153" text-anchor="middle">Exponentiar</text>
  <text class="math" x="762" y="208" text-anchor="middle">[1, .050, .002]</text>
  <text class="note" x="762" y="250" text-anchor="middle">todos positivos</text>
  <line class="arrow" x1="882" y1="200" x2="945" y2="200"/>
  <rect class="panel top" x="953" y="80" width="212" height="240" rx="5"/>
  <text class="title" x="1059" y="130" text-anchor="middle">Normalizar</text>
  <text class="math" x="1059" y="187" text-anchor="middle">[.950, .047, .002]</text>
  <text class="note" x="1059" y="235" text-anchor="middle">suma por fila = 1</text>
  <text class="note" x="1059" y="270" text-anchor="middle">no prueba calibración</text>
  <text class="note" x="600" y="385" text-anchor="middle">La operación se repite de manera independiente para cada observación del batch.</text>
</svg>
