<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Descenso del gradiente como trayectoria sobre una superficie de perdida</title>
  <desc id="desc">Mapa de contornos de una perdida convexa con puntos sucesivos que avanzan desde una perdida alta hacia el minimo, junto con tres escenarios de tasa de aprendizaje.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">Descenso del gradiente: trayectoria, escala y paso</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="20" fill="#475569">Cada actualizacion usa el gradiente local para reducir la perdida, pero el tamano del paso controla estabilidad y velocidad.</text>

  <g transform="translate(80 150)">
    <rect x="0" y="0" width="660" height="500" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="32" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">Mapa de perdida \(J(\theta_1,\theta_2)\)</text>
    <g transform="translate(330 270)">
      <ellipse rx="260" ry="180" fill="none" stroke="#dbeafe" stroke-width="12"/>
      <ellipse rx="215" ry="148" fill="none" stroke="#bfdbfe" stroke-width="10"/>
      <ellipse rx="170" ry="116" fill="none" stroke="#93c5fd" stroke-width="8"/>
      <ellipse rx="125" ry="84" fill="none" stroke="#60a5fa" stroke-width="6"/>
      <ellipse rx="78" ry="50" fill="none" stroke="#2563eb" stroke-width="5"/>
      <circle cx="0" cy="0" r="9" fill="#172033"/>
      <text x="16" y="-12" font-family="Arial, sans-serif" font-size="17" fill="#172033">minimo</text>
    </g>
    <polyline points="120,420 172,366 226,320 282,284 335,258 382,242 420,234" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#dc2626">
      <circle cx="120" cy="420" r="11"/>
      <circle cx="172" cy="366" r="10"/>
      <circle cx="226" cy="320" r="10"/>
      <circle cx="282" cy="284" r="9"/>
      <circle cx="335" cy="258" r="9"/>
      <circle cx="382" cy="242" r="8"/>
      <circle cx="420" cy="234" r="8"/>
    </g>
    <text x="92" y="458" font-family="Arial, sans-serif" font-size="18" fill="#7f1d1d">inicio</text>
    <text x="430" y="230" font-family="Arial, sans-serif" font-size="18" fill="#7f1d1d">iteraciones</text>
    <line x1="70" y1="462" x2="620" y2="462" stroke="#334155" stroke-width="2"/>
    <line x1="70" y1="462" x2="70" y2="92" stroke="#334155" stroke-width="2"/>
    <text x="588" y="492" font-family="Arial, sans-serif" font-size="18" fill="#334155">θ₁</text>
    <text x="38" y="102" font-family="Arial, sans-serif" font-size="18" fill="#334155">θ₂</text>
  </g>

  <g transform="translate(780 150)">
    <rect x="0" y="0" width="350" height="145" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="26" y="42" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#172033">Paso pequeno</text>
    <path d="M32 100 C92 78, 152 67, 300 56" fill="none" stroke="#16a34a" stroke-width="5"/>
    <text x="26" y="126" font-family="Arial, sans-serif" font-size="16" fill="#475569">estable, pero puede ser lento</text>
  </g>
  <g transform="translate(780 328)">
    <rect x="0" y="0" width="350" height="145" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="26" y="42" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#172033">Paso razonable</text>
    <path d="M32 102 C80 58, 144 45, 300 42" fill="none" stroke="#2563eb" stroke-width="5"/>
    <text x="26" y="126" font-family="Arial, sans-serif" font-size="16" fill="#475569">reduce perdida con pocas oscilaciones</text>
  </g>
  <g transform="translate(780 506)">
    <rect x="0" y="0" width="350" height="145" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="26" y="42" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#172033">Paso grande</text>
    <polyline points="32,100 88,45 145,112 205,38 300,118" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="26" y="126" font-family="Arial, sans-serif" font-size="16" fill="#475569">puede oscilar o divergir</text>
  </g>
</svg>
