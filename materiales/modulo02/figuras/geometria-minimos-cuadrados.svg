<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Geometria de minimos cuadrados</title>
  <desc id="desc">El vector y se proyecta sobre el espacio columna de X. El residual r queda perpendicular y satisface X transpuesta por r igual a cero.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <path d="M135 255 L635 255 L760 145 L260 145 Z" fill="#eef6fb" stroke="#17324d" stroke-width="2"/>
  <text x="226" y="284" fill="#17324d" font-family="Arial, sans-serif" font-size="21" font-weight="700">espacio columna de X</text>
  <line x1="310" y1="230" x2="310" y2="68" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="327" y="82" fill="#0f766e" font-family="Arial, sans-serif" font-size="24" font-weight="700">y</text>
  <line x1="310" y1="230" x2="540" y2="182" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="552" y="184" fill="#2563eb" font-family="Arial, sans-serif" font-size="24" font-weight="700">y_hat = X theta</text>
  <line x1="540" y1="182" x2="310" y2="68" stroke="#b91c1c" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="420" y="104" fill="#b91c1c" font-family="Arial, sans-serif" font-size="23" font-weight="700">r = y - y_hat</text>
  <path d="M508 188 L527 211 L552 204" fill="none" stroke="#475569" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="690" y="58" width="220" height="108" rx="10" fill="#f8fafc" stroke="#17324d" stroke-width="2"/>
    <text x="714" y="94" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">condicion optima</text>
    <text x="728" y="132" fill="#0f766e" font-family="Arial, sans-serif" font-size="28" font-weight="700">X<tspan baseline-shift="super" font-size="16">T</tspan> r = 0</text>
  </g>
  <g>
    <circle cx="250" cy="220" r="5" fill="#0f766e"/>
    <circle cx="330" cy="206" r="5" fill="#0f766e"/>
    <circle cx="420" cy="191" r="5" fill="#0f766e"/>
    <circle cx="505" cy="176" r="5" fill="#0f766e"/>
    <circle cx="585" cy="162" r="5" fill="#0f766e"/>
  </g>
</svg>
