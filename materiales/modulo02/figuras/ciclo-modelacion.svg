<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 980 300">
  <title id="title">Ciclo de modelacion aplicada</title>
  <desc id="desc">Diagrama de seis pasos: pregunta aplicada, modelo matematico, algoritmo, implementacion, validacion y decision. El ultimo paso vuelve al primero.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
    <style>
      .box{fill:#f7f9fb;stroke:#17324d;stroke-width:2;rx:12}
      .accent{fill:#0f766e}
      .txt{font-family:Arial, sans-serif;font-size:20px;font-weight:700;fill:#17202a}
      .sub{font-family:Arial, sans-serif;font-size:15px;fill:#52616f}
      .arrow{stroke:#17324d;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="20" y="70" width="135" height="105" class="box"/>
  <circle cx="48" cy="98" r="10" class="accent"/>
  <text x="70" y="104" class="txt">Pregunta</text>
  <text x="42" y="135" class="sub">decision que</text>
  <text x="42" y="154" class="sub">se necesita</text>
  <path d="M158 122 H203" class="arrow"/>
  <rect x="210" y="70" width="135" height="105" class="box"/>
  <circle cx="238" cy="98" r="10" class="accent"/>
  <text x="260" y="104" class="txt">Modelo</text>
  <text x="232" y="135" class="sub">variables,</text>
  <text x="232" y="154" class="sub">supuestos</text>
  <path d="M348 122 H393" class="arrow"/>
  <rect x="400" y="70" width="135" height="105" class="box"/>
  <circle cx="428" cy="98" r="10" class="accent"/>
  <text x="450" y="104" class="txt">Algoritmo</text>
  <text x="422" y="135" class="sub">que se</text>
  <text x="422" y="154" class="sub">optimiza</text>
  <path d="M538 122 H583" class="arrow"/>
  <rect x="590" y="70" width="145" height="105" class="box"/>
  <circle cx="618" cy="98" r="10" class="accent"/>
  <text x="640" y="104" class="txt">Codigo</text>
  <text x="612" y="135" class="sub">notebook y</text>
  <text x="612" y="154" class="sub">pipeline</text>
  <path d="M738 122 H783" class="arrow"/>
  <rect x="790" y="70" width="155" height="105" class="box"/>
  <circle cx="818" cy="98" r="10" class="accent"/>
  <text x="840" y="104" class="txt">Validacion</text>
  <text x="812" y="135" class="sub">baseline,</text>
  <text x="812" y="154" class="sub">metricas</text>
  <path d="M868 178 C850 250 145 250 105 180" class="arrow"/>
  <text x="390" y="258" class="sub">la decision reinicia la pregunta aplicada</text>
</svg>
