<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Forward propagation y formas matriciales</title>
  <desc id="desc">Secuencia desde una matriz de observaciones hasta logits multiclase mediante una capa oculta ReLU.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#cfd5df;stroke-width:2}.accent{stroke:#0f766e;stroke-width:6}
      .blue{stroke:#245bbf;stroke-width:6}.gold{stroke:#a66b00;stroke-width:6}
      .label{font:700 25px Arial,sans-serif;fill:#172033}.shape{font:22px Georgia,serif;fill:#245bbf}
      .detail{font:19px Arial,sans-serif;fill:#566174}.arrow{stroke:#667085;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box accent" x="40" y="105" width="205" height="190" rx="5"/>
  <text class="label" x="142" y="155" text-anchor="middle">Datos</text>
  <text class="shape" x="142" y="202" text-anchor="middle">X ∈ ℝᵐˣᵈ</text>
  <text class="detail" x="142" y="244" text-anchor="middle">m filas · una por dato</text>
  <line class="arrow" x1="255" y1="200" x2="322" y2="200"/>
  <rect class="box blue" x="330" y="75" width="235" height="250" rx="5"/>
  <text class="label" x="447" y="128" text-anchor="middle">Capa oculta</text>
  <text class="shape" x="447" y="174" text-anchor="middle">Z¹ = XW¹ + b¹</text>
  <line x1="365" y1="199" x2="530" y2="199" stroke="#cfd5df"/>
  <text class="shape" x="447" y="240" text-anchor="middle">A¹ = ReLU(Z¹)</text>
  <text class="detail" x="447" y="282" text-anchor="middle">A¹ ∈ ℝᵐˣʰ</text>
  <line class="arrow" x1="575" y1="200" x2="642" y2="200"/>
  <rect class="box gold" x="650" y="105" width="235" height="190" rx="5"/>
  <text class="label" x="767" y="155" text-anchor="middle">Salida afín</text>
  <text class="shape" x="767" y="202" text-anchor="middle">Z² = A¹W² + b²</text>
  <text class="detail" x="767" y="244" text-anchor="middle">Z² ∈ ℝᵐˣᵏ</text>
  <line class="arrow" x1="895" y1="200" x2="962" y2="200"/>
  <rect class="box accent" x="970" y="105" width="190" height="190" rx="5"/>
  <text class="label" x="1065" y="155" text-anchor="middle">Logits</text>
  <text class="shape" x="1065" y="202" text-anchor="middle">k por fila</text>
  <text class="detail" x="1065" y="244" text-anchor="middle">antes de softmax</text>
  <text class="detail" x="600" y="385" text-anchor="middle">Sin ReLU, las dos transformaciones afines colapsan en una sola.</text>
</svg>
