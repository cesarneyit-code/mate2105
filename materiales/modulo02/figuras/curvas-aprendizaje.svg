<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Curvas de aprendizaje</title>
  <desc id="desc">Tres diagnosticos: overfitting, underfitting y estabilidad al aumentar datos.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <g transform="translate(55,46)">
    <text x="80" y="-12" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">overfitting</text>
    <line x1="0" y1="230" x2="245" y2="230" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="230" x2="0" y2="10" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="62" y="260" fill="#475569" font-family="Arial, sans-serif" font-size="16">tamano train</text>
    <text x="-36" y="22" fill="#475569" font-family="Arial, sans-serif" font-size="16" transform="rotate(-90 -36 22)">score</text>
    <path d="M18 45 C70 38, 150 37, 225 36" fill="none" stroke="#2563eb" stroke-width="5"/>
    <path d="M18 165 C80 145, 145 130, 225 118" fill="none" stroke="#0f766e" stroke-width="5"/>
    <text x="150" y="31" fill="#2563eb" font-family="Arial, sans-serif" font-size="15">train</text>
    <text x="156" y="112" fill="#0f766e" font-family="Arial, sans-serif" font-size="15">validacion</text>
    <path d="M205 48 L205 112" stroke="#b91c1c" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="132" y="83" fill="#b91c1c" font-family="Arial, sans-serif" font-size="15">brecha</text>
  </g>
  <g transform="translate(370,46)">
    <text x="80" y="-12" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">underfitting</text>
    <line x1="0" y1="230" x2="245" y2="230" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="230" x2="0" y2="10" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M18 165 C78 155, 150 149, 225 146" fill="none" stroke="#2563eb" stroke-width="5"/>
    <path d="M18 185 C78 174, 150 168, 225 164" fill="none" stroke="#0f766e" stroke-width="5"/>
    <text x="151" y="141" fill="#2563eb" font-family="Arial, sans-serif" font-size="15">train</text>
    <text x="146" y="183" fill="#0f766e" font-family="Arial, sans-serif" font-size="15">validacion</text>
    <text x="68" y="260" fill="#475569" font-family="Arial, sans-serif" font-size="16">tamano train</text>
    <text x="44" y="116" fill="#b45309" font-family="Arial, sans-serif" font-size="15">ambos bajos</text>
  </g>
  <g transform="translate(685,46)">
    <text x="98" y="-12" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">estable</text>
    <line x1="0" y1="230" x2="245" y2="230" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="230" x2="0" y2="10" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M18 68 C85 62, 160 60, 225 58" fill="none" stroke="#2563eb" stroke-width="5"/>
    <path d="M18 155 C78 115, 150 82, 225 66" fill="none" stroke="#0f766e" stroke-width="5"/>
    <text x="151" y="53" fill="#2563eb" font-family="Arial, sans-serif" font-size="15">train</text>
    <text x="137" y="86" fill="#0f766e" font-family="Arial, sans-serif" font-size="15">validacion</text>
    <text x="68" y="260" fill="#475569" font-family="Arial, sans-serif" font-size="16">tamano train</text>
    <text x="67" y="126" fill="#0f766e" font-family="Arial, sans-serif" font-size="15">brecha cierra</text>
  </g>
