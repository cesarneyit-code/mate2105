<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Regularizacion Ridge y Lasso</title>
  <desc id="desc">Comparacion de coeficientes sin regularizacion, con Ridge y con Lasso. Ridge reduce magnitudes y Lasso puede llevar coeficientes exactamente a cero.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="64" y="40" fill="#17324d" font-family="Arial, sans-serif" font-size="26" font-weight="700">Regularizacion: controlar complejidad sin cambiar la pregunta</text>

  <g transform="translate(55,78)">
    <rect x="0" y="0" width="260" height="205" rx="12" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="30" y="34" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">OLS</text>
    <line x1="42" y1="162" x2="222" y2="162" stroke="#475569" stroke-width="2"/>
    <rect x="58" y="52" width="24" height="110" fill="#2563eb"/>
    <rect x="98" y="88" width="24" height="74" fill="#2563eb"/>
    <rect x="138" y="30" width="24" height="132" fill="#2563eb"/>
    <rect x="178" y="120" width="24" height="42" fill="#2563eb"/>
    <text x="42" y="188" fill="#475569" font-family="Arial, sans-serif" font-size="16">coeficientes grandes</text>
  </g>

  <path d="M332 180 L396 180" stroke="#17324d" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(405,78)">
    <rect x="0" y="0" width="260" height="205" rx="12" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="30" y="34" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">Ridge, L2</text>
    <line x1="42" y1="162" x2="222" y2="162" stroke="#475569" stroke-width="2"/>
    <rect x="58" y="82" width="24" height="80" fill="#0f766e"/>
    <rect x="98" y="108" width="24" height="54" fill="#0f766e"/>
    <rect x="138" y="68" width="24" height="94" fill="#0f766e"/>
    <rect x="178" y="132" width="24" height="30" fill="#0f766e"/>
    <text x="42" y="188" fill="#475569" font-family="Arial, sans-serif" font-size="16">encoge magnitudes</text>
  </g>

  <path d="M682 180 L746 180" stroke="#17324d" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(755,78)">
    <rect x="0" y="0" width="170" height="205" rx="12" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="24" y="34" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">Lasso, L1</text>
    <line x1="30" y1="162" x2="145" y2="162" stroke="#475569" stroke-width="2"/>
    <rect x="43" y="102" width="22" height="60" fill="#b45309"/>
    <rect x="78" y="162" width="22" height="0.1" fill="#b45309"/>
    <rect x="113" y="92" width="22" height="70" fill="#b45309"/>
    <text x="28" y="188" fill="#475569" font-family="Arial, sans-serif" font-size="16">selecciona variables</text>
  </g>

  <g transform="translate(93,310)">
    <text x="0" y="0" fill="#17324d" font-family="Arial, sans-serif" font-size="21" font-weight="700">Idea matematica:</text>
    <text x="178" y="0" fill="#17324d" font-family="Arial, sans-serif" font-size="21">minimizar perdida + penalizacion; validar lambda antes de decidir.</text>
  </g>
</svg>
