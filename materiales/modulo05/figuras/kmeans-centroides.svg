<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">K-Means y centroides</title>
  <desc id="desc">K-Means alterna asignacion de puntos al centroide mas cercano y actualizacion del centroide como promedio del grupo.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <g transform="translate(55,36)">
    <rect x="0" y="0" width="410" height="260" rx="14" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="34" y="38" fill="#17324d" font-family="Arial, sans-serif" font-size="24" font-weight="700">1. Asignar al centroide cercano</text>
    <g fill="#2563eb">
      <circle cx="95" cy="95" r="7"/><circle cx="132" cy="116" r="7"/><circle cx="116" cy="154" r="7"/><circle cx="164" cy="144" r="7"/><circle cx="143" cy="82" r="7"/>
    </g>
    <g fill="#0f766e">
      <circle cx="260" cy="100" r="7"/><circle cx="300" cy="125" r="7"/><circle cx="281" cy="164" r="7"/><circle cx="335" cy="150" r="7"/><circle cx="322" cy="82" r="7"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
      <text x="122" y="128" fill="#b91c1c">x</text>
      <text x="286" y="132" fill="#b91c1c">x</text>
    </g>
    <g stroke="#b91c1c" stroke-width="3" fill="none">
      <path d="M95 95 L130 122"/><path d="M260 100 L294 126"/>
      <path d="M164 144 L130 122"/><path d="M335 150 L294 126"/>
    </g>
    <text x="74" y="224" fill="#475569" font-family="Arial, sans-serif" font-size="18">distancia decide pertenencia</text>
  </g>
  <g transform="translate(515,36)">
    <rect x="0" y="0" width="410" height="260" rx="14" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="34" y="38" fill="#17324d" font-family="Arial, sans-serif" font-size="24" font-weight="700">2. Actualizar como promedio</text>
    <g fill="#2563eb">
      <circle cx="95" cy="95" r="7"/><circle cx="132" cy="116" r="7"/><circle cx="116" cy="154" r="7"/><circle cx="164" cy="144" r="7"/><circle cx="143" cy="82" r="7"/>
    </g>
    <g fill="#0f766e">
      <circle cx="260" cy="100" r="7"/><circle cx="300" cy="125" r="7"/><circle cx="281" cy="164" r="7"/><circle cx="335" cy="150" r="7"/><circle cx="322" cy="82" r="7"/>
    </g>
    <circle cx="130" cy="118" r="13" fill="#ffffff" stroke="#b91c1c" stroke-width="4"/>
    <circle cx="300" cy="124" r="13" fill="#ffffff" stroke="#b91c1c" stroke-width="4"/>
    <path d="M118 156 C122 144, 126 132, 130 118" fill="none" stroke="#17324d" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M282 164 C288 148, 294 136, 300 124" fill="none" stroke="#17324d" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="72" y="224" fill="#475569" font-family="Arial, sans-serif" font-size="18">repetir hasta convergencia</text>
  </g>
  <text x="228" y="324" fill="#17324d" font-family="Arial, sans-serif" font-size="21" font-weight="700">K-Means optimiza geometria; interpretar requiere validacion</text>
</svg>
