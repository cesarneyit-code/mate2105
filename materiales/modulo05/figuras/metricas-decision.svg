<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Metricas orientadas por decision</title>
  <desc id="desc">Mapa para elegir metricas segun el costo relativo de falsos positivos y falsos negativos, y segun balance de clases.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#17324d"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="64" y="40" fill="#17324d" font-family="Arial, sans-serif" font-size="26" font-weight="700">La metrica correcta depende del error que importa</text>

  <g transform="translate(58,82)">
    <line x1="0" y1="200" x2="280" y2="200" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="200" x2="0" y2="0" stroke="#17324d" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="72" y="232" fill="#475569" font-family="Arial, sans-serif" font-size="17">costo falso positivo</text>
    <text x="2" y="-18" fill="#475569" font-family="Arial, sans-serif" font-size="17">costo falso negativo</text>
    <rect x="30" y="38" width="92" height="72" rx="10" fill="#dcfce7" stroke="#166534"/>
    <text x="47" y="80" fill="#166534" font-family="Arial, sans-serif" font-size="19" font-weight="700">recall</text>
    <rect x="158" y="38" width="92" height="72" rx="10" fill="#fee2e2" stroke="#b91c1c"/>
    <text x="176" y="80" fill="#b91c1c" font-family="Arial, sans-serif" font-size="19" font-weight="700">F_beta</text>
    <rect x="158" y="132" width="92" height="52" rx="10" fill="#e0f2fe" stroke="#2563eb"/>
    <text x="170" y="165" fill="#2563eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">precision</text>
    <rect x="30" y="132" width="92" height="52" rx="10" fill="#f8fafc" stroke="#64748b"/>
    <text x="45" y="165" fill="#475569" font-family="Arial, sans-serif" font-size="18" font-weight="700">accuracy</text>
  </g>

  <g transform="translate(390,78)">
    <rect x="0" y="0" width="220" height="205" rx="12" fill="#f8fafc" stroke="#d5dee8"/>
    <text x="28" y="38" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">Datos desbalanceados</text>
    <circle cx="55" cy="82" r="8" fill="#2563eb"/>
    <circle cx="82" cy="82" r="8" fill="#2563eb"/>
    <circle cx="109" cy="82" r="8" fill="#2563eb"/>
    <circle cx="136" cy="82" r="8" fill="#2563eb"/>
    <circle cx="163" cy="82" r="8" fill="#2563eb"/>
    <circle cx="55" cy="112" r="8" fill="#2563eb"/>
    <circle cx="82" cy="112" r="8" fill="#2563eb"/>
    <circle cx="109" cy="112" r="8" fill="#2563eb"/>
    <circle cx="136" cy="112" r="8" fill="#2563eb"/>
    <circle cx="163" cy="112" r="8" fill="#b91c1c"/>
    <text x="28" y="158" fill="#475569" font-family="Arial, sans-serif" font-size="17">Accuracy puede ocultar</text>
    <text x="28" y="181" fill="#475569" font-family="Arial, sans-serif" font-size="17">fallos en la clase rara.</text>
  </g>

  <path d="M630 180 L704 180" stroke="#17324d" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(725,78)">
    <rect x="0" y="0" width="200" height="205" rx="12" fill="#eef6fb" stroke="#17324d"/>
    <text x="28" y="38" fill="#17324d" font-family="Arial, sans-serif" font-size="22" font-weight="700">Reporte minimo</text>
    <text x="28" y="78" fill="#17324d" font-family="Arial, sans-serif" font-size="18">1. metrica primaria</text>
    <text x="28" y="108" fill="#17324d" font-family="Arial, sans-serif" font-size="18">2. umbral elegido</text>
    <text x="28" y="138" fill="#17324d" font-family="Arial, sans-serif" font-size="18">3. matriz confusion</text>
    <text x="28" y="168" fill="#17324d" font-family="Arial, sans-serif" font-size="18">4. costo de errores</text>
  </g>
</svg>
